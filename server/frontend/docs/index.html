<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SenseMate Frontend Documentation</title>
  <meta name="description" content="Documentation for the SenseMate frontend application - RIOT PO-2026">
  <link rel="icon" href="https://docsify.js.org/_media/icon.svg" type="image/svg+xml">

  <!-- docsify theme -->
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">

  <style>
    :root {
      --docsifytabs-border-color: #e0e0e0;
      --theme-color: #42b983;
    }
    .markdown-section h1:first-child {
      display: none;
    }
    .markdown-section h1 {
      font-size: 2.2rem;
      border-bottom: 2px solid #42b983;
      padding-bottom: 0.5rem;
      margin-top: 2rem;
    }
    .markdown-section h2 {
      font-size: 1.6rem;
      border-bottom: 1px solid #eee;
      padding-bottom: 0.3rem;
    }
    .markdown-section h3 {
      font-size: 1.25rem;
    }
  </style>
</head>
<body>
  <div id="app">Loading documentation...</div>

  <script>
    window.$docsify = {
      name: 'SenseMate Frontend',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 3,
      auto2top: true,
      search: {
        maxAge: 86400000,
        paths: 'auto',
        placeholder: 'Search',
        noData: 'No results!'
      }
    };
  </script>

  <script src="//cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify@4"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-copy-code@2"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify-mermaid@2.0.1/dist/docsify-mermaid.min.js"></script>
</body>
</html>
