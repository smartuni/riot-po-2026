# Development Profile Configuration
# Usage: spring.profiles.active=dev

# Enable test data initialization via CommandLineRunner
# This profile automatically loads PopulateTestDataRunner component

# Logging - verbose for development
logging.level.root=INFO
logging.level.com.riot.matesense=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# JPA - show SQL statements
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true

# Flyway - verbose logging
logging.level.org.flywaydb=DEBUG

# MQTT - use test credentials (from application.yml)
# Override in .env or application-dev.local.properties if needed

# Web - detailed error messages
server.error.include-message=always
server.error.include-binding-errors=always
server.error.include-stacktrace=always
server.error.include-exception=false

