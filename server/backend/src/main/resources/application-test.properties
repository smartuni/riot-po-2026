# Test Configuration - Using H2 in-memory database for fast testing
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console (for debugging in tests)
spring.h2.console.enabled=true

# JPA / Hibernate Configuration for Testing
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Flyway disabled for tests - H2 will handle schema
spring.flyway.enabled=false

# Logging
logging.level.root=WARN
logging.level.com.riot.matesense=DEBUG
logging.level.org.hibernate.SQL=DEBUG

